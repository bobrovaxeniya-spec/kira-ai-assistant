version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: aiagent
      POSTGRES_PASSWORD: StrongPassword123
      POSTGRES_DB: ai_team
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiagent"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ai_network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ai_network

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    command: serve
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ai_network

  celery_worker:
    build: .
    environment:
      - DATABASE_URL=postgresql://aiagent:StrongPassword123@postgres:5432/ai_team
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_URL=http://ollama:11434
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    command: celery -A app.celery_worker worker --loglevel=info
    volumes:
      - .:/app
    networks:
      - ai_network

  api:
    build: .
    environment:
      - DATABASE_URL=postgresql://aiagent:StrongPassword123@postgres:5432/ai_team
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_URL=http://ollama:11434
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    command: uvicorn app.orchestrator:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    networks:
      - ai_network

  flower:
    image: mher/flower:latest
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - celery_worker
    networks:
      - ai_network

volumes:
  postgres_data:
  ollama_data:

networks:
  ai_network:
    driver: bridge
